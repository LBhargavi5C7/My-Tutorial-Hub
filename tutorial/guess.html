<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guess Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;       
color: #39ff14;       
text-align: center;
    }

    .container {
      background: #1a1a1a;
      padding: 20px;
      margin: 100px auto;
      width: 320px;
      border-radius: 10px;
      box-shadow: 0 0 20px #ff00ff; /* Neon pink glow */
    }

    h2 {
      color: #00ffff; /* Neon cyan */
      text-shadow: 0 0 10px #00ffff;
    }

    input {
      padding: 10px;
      width: 80%;
      margin: 10px 0;
      background: #000;
      border: 1px solid #39ff14;
      color: #39ff14;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 0 10px #39ff14;
    }

    button {
      padding: 10px 20px;
      background: #ff00ff;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
      text-shadow: 0 0 5px #fff;
      box-shadow: 0 0 15px #ff00ff;
    }

    button:hover {
      background: #00ffff;
      box-shadow: 0 0 20px #00ffff;
    }

    #msg {
      font-weight: bold;
      margin-top: 15px;
      color: #ffea00; /* Neon yellow */
      text-shadow: 0 0 10px #ffea00;
    }
  </style>
</head>
<body onload="init()">

<div class="container">
  <h2>Guess the Number</h2>

  <p id="range"></p>
  <p id="prize"></p>

  <input type="number" id="guess" placeholder="Enter guess & press Enter">

  <br><br>

  <button onclick="resetGame()">Reset Game</button>

  <p id="msg"></p>
</div>

<script>
let number;
let prize;
let attempts;

function init() {
  number = Math.floor(Math.random() * 100) + 1;
  prize = 1000;
  attempts = 0;

  document.getElementById("range").innerHTML = "Guess a number between 1 and 100";
  document.getElementById("prize").innerHTML = "Prize: ₹" + prize;
  document.getElementById("msg").innerHTML = "";

  document.getElementById("guess").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
      check();
    }
  });
}

function check() {
  let input = document.getElementById("guess");
  let userGuess = parseInt(input.value);

  if (isNaN(userGuess)) return;

  attempts++;

  if (prize <= 0) {
    document.getElementById("msg").innerHTML =
      "Game Over! Number was " + number;
    return;
  }

  if (userGuess === number) {
    document.getElementById("msg").innerHTML =
      "Correct! You won ₹" + prize + " in " + attempts + " attempts!";
  } else if (userGuess > number) {
    prize -= 100;
    document.getElementById("msg").innerHTML = "Too big! Try smaller.";
  } else {
    prize -= 100;
    document.getElementById("msg").innerHTML = "Too small! Try bigger.";
  }

  document.getElementById("prize").innerHTML = "Prize: ₹" + prize;
  input.value = "";

  if (prize <= 0) {
    document.getElementById("msg").innerHTML =
      "Game Over! Prize is ₹0. Number was " + number;
  }
}

function resetGame() {
  number = Math.floor(Math.random() * 100) + 1;
  prize = 1000;
  attempts = 0;

  document.getElementById("range").innerHTML = "Guess a number between 1 and 100";
  document.getElementById("prize").innerHTML = "Prize: ₹" + prize;
  document.getElementById("msg").innerHTML = "";
  document.getElementById("guess").value = "";
}
</script>

</body>
</html>
